<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>简历生成器 — Auto Offer</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   Design tokens — extracted from the NFT dashboard reference
   ═══════════════════════════════════════════════════════════════ */
:root {
  --app-bg-1: #c8c0d0;
  --app-bg-2: #ddd5e0;
  --app-bg-3: #c5c0d0;
  --shell: #25222d;
  --shell-dark: #1e1b26;
  --card: #2d2a35;
  --card-hover: #353240;
  --input-bg: #363240;
  --border: #3d3847;
  --border-light: #4a4555;
  --text: #ffffff;
  --text-secondary: #a8a3b3;
  --text-tertiary: #6e687a;
  --lavender: #c4b5e0;
  --lavender-soft: rgba(196,181,224,.12);
  --mint: #9dd3b3;
  --mint-soft: rgba(157,211,179,.12);
  --cream: #f0e0a0;
  --cream-soft: rgba(240,224,160,.12);
  --rose: #e8b0a8;
  --rose-soft: rgba(232,176,168,.12);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --radius-pill: 999px;
}
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, var(--app-bg-1) 0%, var(--app-bg-2) 50%, var(--app-bg-3) 100%);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.app-wrapper {
  width: 100%;
  max-width: 1600px;
  height: calc(100vh - 48px);
  background: var(--shell);
  border-radius: var(--radius-xl);
  box-shadow: 0 24px 80px rgba(30,27,38,.35), 0 8px 24px rgba(30,27,38,.2), inset 0 1px 0 rgba(255,255,255,.04);
  display: flex;
  overflow: hidden;
}

.sidebar {
  width: 72px;
  background: var(--shell-dark);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 0 16px;
  flex-shrink: 0;
}
.logo {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, var(--lavender), var(--mint));
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 700; color: var(--shell-dark);
  margin-bottom: 28px;
  box-shadow: 0 4px 12px rgba(196,181,224,.25);
}
.nav { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; padding: 0 12px; }
.nav-item {
  width: 44px; height: 44px; border-radius: 50%; border: none; background: transparent;
  color: var(--text-tertiary); font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s ease; position: relative;
}
.nav-item:hover { background: var(--card); color: var(--text-secondary); }
.nav-item.active { background: var(--card); color: var(--lavender); box-shadow: 0 2px 8px rgba(0,0,0,.15), inset 0 1px 0 rgba(255,255,255,.04); }
.nav-item.active::before { content: ''; position: absolute; left: -12px; top: 50%; transform: translateY(-50%); width: 3px; height: 20px; background: var(--lavender); border-radius: 0 3px 3px 0; }
.nav-bottom { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 0 12px; }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--cream), var(--rose)); display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--shell-dark); margin-top: 8px; }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
.topbar { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: linear-gradient(180deg, rgba(255,255,255,.02) 0%, transparent 100%); }
.topbar-left { display: flex; align-items: center; gap: 20px; }
.topbar-left h1 { font-size: 18px; font-weight: 600; letter-spacing: -.2px; background: linear-gradient(135deg, #fff, var(--lavender)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.topbar-right { display: flex; align-items: center; gap: 10px; }

.tpl-group { display: flex; gap: 6px; background: var(--card); border-radius: var(--radius-pill); padding: 4px; border: 1px solid var(--border); }
.tpl-btn { padding: 6px 16px; border-radius: var(--radius-pill); border: none; background: transparent; color: var(--text-tertiary); cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 500; transition: all .2s ease; white-space: nowrap; }
.tpl-btn:hover { color: var(--text-secondary); }
.tpl-btn.active { background: linear-gradient(135deg, var(--lavender), #b8a8d8); color: var(--shell-dark); box-shadow: 0 2px 8px rgba(196,181,224,.2); }

.btn { padding: 8px 20px; border-radius: var(--radius-pill); font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; transition: all .2s ease; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary { background: linear-gradient(135deg, var(--lavender), #b8a8d8); color: var(--shell-dark); box-shadow: 0 2px 8px rgba(196,181,224,.2); }
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(196,181,224,.35); }
.btn-ghost { background: var(--card); color: var(--text-secondary); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--card-hover); border-color: var(--border-light); color: var(--text); }
.btn-small { padding: 6px 14px; font-size: 12px; }

.workspace { flex: 1; display: flex; min-height: 0; padding: 20px 24px 24px; gap: 20px; }
.editor { width: 420px; flex-shrink: 0; background: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 4px 20px rgba(0,0,0,.1); display: flex; flex-direction: column; overflow: hidden; }
.editor-body { flex: 1; overflow-y: auto; padding: 20px 20px 24px; }
.editor-body::-webkit-scrollbar { width: 5px; }
.editor-body::-webkit-scrollbar-track { background: transparent; }
.editor-body::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 999px; }
.editor-section { margin-bottom: 24px; background: var(--shell); border-radius: var(--radius-md); padding: 16px; border: 1px solid var(--border); transition: border-color .2s ease; }
.editor-section:hover { border-color: var(--border-light); }
.editor-section-title { font-size: 13px; font-weight: 600; color: var(--lavender); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.editor-section-title .sec-icon { font-size: 15px; width: 28px; height: 28px; border-radius: 50%; background: var(--lavender-soft); display: flex; align-items: center; justify-content: center; }

.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label { display: block; font-size: 11px; font-weight: 500; color: var(--text-tertiary); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .5px; }
.field input, .field textarea, .field select { width: 100%; padding: 10px 14px; border-radius: var(--radius-sm); font-size: 14px; font-family: inherit; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); outline: none; transition: all .2s ease; resize: vertical; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--lavender); box-shadow: 0 0 0 3px var(--lavender-soft); }
.field textarea { min-height: 72px; line-height: 1.6; }
.field-row { display: flex; gap: 10px; }
.field-row .field { flex: 1; }

.list-item { background: var(--input-bg); border-radius: var(--radius-sm); padding: 14px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; transition: all .2s ease; }
.list-item:hover { border-color: var(--border-light); box-shadow: 0 2px 8px rgba(0,0,0,.1); }
.list-item .remove-btn { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: var(--text-tertiary); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all .15s ease; }
.list-item .remove-btn:hover { background: var(--rose-soft); border-color: var(--rose); color: var(--rose); }
.add-btn { width: 100%; padding: 10px; border-radius: var(--radius-sm); border: 1.5px dashed var(--border); background: transparent; color: var(--text-tertiary); cursor: pointer; font-size: 13px; font-family: inherit; font-weight: 500; transition: all .2s ease; }
.add-btn:hover { border-color: var(--mint); color: var(--mint); background: var(--mint-soft); }

.preview { flex: 1; display: flex; align-items: flex-start; justify-content: center; background: var(--card); border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: inset 0 1px 0 rgba(255,255,255,.03), 0 4px 20px rgba(0,0,0,.1); padding: 28px; overflow-y: auto; position: relative; }
.preview::before { content: ''; position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 60px; height: 4px; border-radius: 999px; background: var(--border); opacity: .5; }
.preview::-webkit-scrollbar { width: 5px; }
.preview::-webkit-scrollbar-track { background: transparent; }
.preview::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 999px; }

.resume-paper { width: 794px; min-height: 1123px; background: #fff; box-shadow: 0 8px 40px rgba(0,0,0,.25); border-radius: 3px; color: #333; font-size: 14px; line-height: 1.7; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; transition: all .3s ease; position: relative; z-index: 1; }

/* ═══════════════════════════════════════════════════════════════
   Template 1 — 蓝色弧形顶栏 + 绿色标签
   ═══════════════════════════════════════════════════════════════ */
.resume-paper.tpl-1 { background: #fff; color: #333; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 13px; line-height: 1.7; }
.tpl-1-header-top { background: linear-gradient(135deg, #5b9bd5, #4a8fd8); height: 110px; border-radius: 0 0 50% 50% / 0 0 30px 30px; }
.tpl-1-avatar { width: 90px; height: 90px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 2px 8px rgba(0,0,0,.1); margin: -30px auto 10px; background: #e0e0e0; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #999; overflow: hidden; }
.tpl-1-avatar img { width: 100%; height: 100%; object-fit: cover; }
.tpl-1-name { text-align: center; font-size: 22px; font-weight: 600; color: #333; }
.tpl-1-contact { text-align: center; font-size: 12px; color: #666; margin-top: 6px; }
.tpl-1-job { text-align: center; font-size: 12px; color: #888; margin-top: 4px; }
.tpl-1-main { padding: 20px 45px 40px; }
.tpl-1-sec { margin-bottom: 18px; }
.tpl-1-sec-title { display: inline-block; background: #5cb85c; color: #fff; padding: 3px 18px; border-radius: 2px; font-size: 13px; font-weight: 600; margin-bottom: 10px; }
.tpl-1-item { margin-bottom: 12px; }
.tpl-1-item-hd { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.tpl-1-item-title { font-weight: 600; font-size: 13px; color: #333; }
.tpl-1-item-sub { font-size: 12px; color: #555; }
.tpl-1-item-date { font-size: 12px; color: #888; white-space: nowrap; margin-left: 10px; }

.tpl-1-bullets { margin: 4px 0 0 0; padding-left: 16px; }

/* ═══════════════════════════════════════════════════════════════
   Template 2 — 左侧sidebar + 右侧内容
   ═══════════════════════════════════════════════════════════════ */
.resume-paper.tpl-2 { display: flex; background: #fff; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 12px; line-height: 1.6; color: #333; }

.tpl-2-main { flex: 1; padding: 0; }

.tpl-2-sec { margin-bottom: 18px; }

.tpl-2-sec-icon { width: 24px; height: 24px; border-radius: 50%; background: #5b9bd5; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 11px; }
.tpl-2-sec-title { font-size: 14px; font-weight: 600; color: #333; }
.tpl-2-item { margin-bottom: 10px; }
.tpl-2-item-hd { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.tpl-2-item-title { font-weight: 600; font-size: 12px; color: #333; }
.tpl-2-item-sub { font-size: 11px; color: #555; }
.tpl-2-item-date { font-size: 11px; color: #888; white-space: nowrap; }
.tpl-2-item-desc { font-size: 11.5px; color: #555; margin-top: 3px; line-height: 1.6; }
.tpl-2-bullets { margin: 4px 0 0 0; padding-left: 14px; }

/* ═══════════════════════════════════════════════════════════════
   Template 3 — 蓝色banner + 时间线
   ═══════════════════════════════════════════════════════════════ */
.resume-paper.tpl-3 { background: #fff; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 13px; line-height: 1.7; color: #333; }
.tpl-3-header { background: #5b9bd5; color: #fff; text-align: center; padding: 30px 20px 25px; }
.tpl-3-avatar { width: 85px; height: 85px; border-radius: 50%; border: 3px solid rgba(255,255,255,.5); margin: 0 auto 12px; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-size: 30px; overflow: hidden; }

.tpl-3-item-title { font-weight: 600; font-size: 13px; color: #333; }
.tpl-3-item-title-blue { font-weight: 600; font-size: 13px; color: #5b9bd5; }

.tpl-3-bullets { margin: 4px 0 0 0; padding-left: 16px; }
.tpl-3-bullets li { font-size: 12px; color: #555; margin-bottom: 2px; }

/* ═══════════════════════════════════════════════════════════════

   ═══════════════════════════════════════════════════════════════ */
.resume-paper.tpl-5 { background: #fff; font-family: 'PingFang SC','Microsoft YaHei',sans-serif; font-size: 12.5px; line-height: 1.7; color: #333; }

.tpl-5-bullets li { font-size: 12px; color: #555; margin-bottom: 2px; line-height: 1.6; }

/* ═══════════════════════════════════════════════════════════════
   Print
   ═══════════════════════════════════════════════════════════════ */
@media print {
  body { background: #fff; padding: 0; height: auto; overflow: visible; }
  .app-wrapper { background: #fff; box-shadow: none; border-radius: 0; width: 100%; height: auto; overflow: visible; }
  .sidebar, .topbar { display: none !important; }
  .workspace { padding: 0; gap: 0; }
  .editor { display: none !important; }
  .preview { background: #fff; padding: 0; overflow: visible; box-shadow: none; border: none; border-radius: 0; }
  .preview::before { display: none; }
  .resume-paper { box-shadow: none; width: 100%; min-height: 0; border-radius: 0; }
}

/* Toast */
.toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--card); color: var(--text); padding: 12px 24px; border-radius: var(--radius-pill); font-size: 13px; z-index: 999; border: 1px solid var(--border); box-shadow: 0 8px 32px rgba(0,0,0,.4); animation: toastIn .3s ease; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

/* Responsive */
@media (max-width: 1300px) { .editor { width: 360px; } .resume-paper { transform: scale(.85); transform-origin: top center; } }
@media (max-width: 1100px) { .app-wrapper { border-radius: 20px; } .sidebar { width: 60px; } .editor { width: 320px; } .resume-paper { transform: scale(.75); } }

<script>
var R = {
  info: { name:'', birthday:'', gender:'', email:'', phone:'', wechat:'', hometown:'', political:'', workStart:'', avatar:'' },
  expectation: { position:'', city:'', salary:'' },
  advantage: '',
  workExps: [],
  internships: [],
  educations: [],
  projects: [],
  activities: [],
  certs: [],
  awards: [],
  socials: []
};
var currentTemplate = '1';

// ── Form builders ──────────────────────────────────────────────
function formInfo() {
  var d = R.info;
  return fld('姓名')+inp('info.name',d.name,'请输入姓名')+
    fld('头像URL')+inp('info.avatar',d.avatar,'https://example.com/avatar.jpg')+
    frow(fld('生日')+inp('info.birthday',d.birthday,'','date'),fld('性别')+sel('info.gender',d.gender,['','男','女']))+
    frow(fld('邮箱')+inp('info.email',d.email,'请输入邮箱','email'),fld('电话')+inp('info.phone',d.phone,'请输入电话','tel'))+
    frow(fld('微信号')+inp('info.wechat',d.wechat,'请输入微信号'),fld('籍贯')+inp('info.hometown',d.hometown,'请输入籍贯'))+
    frow(fld('政治面貌')+sel('info.political',d.political,['','群众','共青团员','共产党员','民主党派','无党派人士']),fld('参加工作时间')+inp('info.workStart',d.workStart,'','month'));
}
function formExpectation() {
  var d = R.expectation;
  return fld('期望职位')+inp('expectation.position',d.position,'请输入职位关键词')+
    fld('期望城市')+inp('expectation.city',d.city,'例如：杭州')+
    fld('薪资要求')+inp('expectation.salary',d.salary,'例如：15k-25k 或 面议');
}
function formAdvantage() { return fld('个人优势 / 自我评价')+txt('advantage',R.advantage,'描述你的核心竞争力、专业特长...'); }
function formWorkExps() { return formList('workExps', R.workExps, workExpTemplate); }
function formInternships() { return formList('internships', R.internships, internshipTemplate); }
function formEducations() { return formList('educations', R.educations, educationTemplate); }
function formProjects() { return formList('projects', R.projects, projectTemplate); }
function formActivities() { return formList('activities', R.activities, activityTemplate); }
function formCerts() { return formList('certs', R.certs, certTemplate); }
function formAwards() { return formList('awards', R.awards, awardTemplate); }
function formSocials() { return formList('socials', R.socials, socialTemplate); }

function workExpTemplate(item, idx, prefix) {
  return frow(fld('公司名称')+inp(prefix+'.company',item.company||'','请输入公司名称'),fld('职位')+inp(prefix+'.position',item.position||'','请输入职位'))+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','','month'))+
    fld('工作内容')+txt(prefix+'.description',item.description||'','描述主要工作职责和内容')+
    fld('工作成果')+txt(prefix+'.achievements',item.achievements||'','量化成果，如业绩提升、项目成果');
}
function internshipTemplate(item, idx, prefix) { return workExpTemplate(item, idx, prefix); }
function educationTemplate(item, idx, prefix) {
  return frow(fld('学校')+inp(prefix+'.school',item.school||'','请输入学校名称'),fld('专业')+inp(prefix+'.major',item.major||'','请输入专业'))+
    frow(fld('学历')+sel(prefix+'.degree',item.degree||'',['','大专','本科','硕士','博士','中专/中技','高中','初中及以下']),fld('')+'')+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','','month'));
}
function projectTemplate(item, idx, prefix) {
  return frow(fld('项目名称')+inp(prefix+'.name',item.name||'','请输入项目名称'),fld('担任角色')+inp(prefix+'.role',item.role||'','请输入角色'))+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','','month'))+
    fld('项目描述')+txt(prefix+'.description',item.description||'','描述项目背景、目标、技术栈')+
    fld('项目成果')+txt(prefix+'.achievements',item.achievements||'','个人贡献和量化成果');
}
function activityTemplate(item, idx, prefix) {
  return frow(fld('组织名称')+inp(prefix+'.orgName',item.orgName||'','请输入组织名称'),fld('担任角色')+inp(prefix+'.role',item.role||'','请输入角色'))+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','','month'))+
    fld('经历描述')+txt(prefix+'.description',item.description||'','描述活动内容和收获');
}
function certTemplate(item, idx, prefix) {
  return frow(fld('证书名称')+inp(prefix+'.name',item.name||'','请输入证书名称'),fld('获得时间')+inp(prefix+'.date',item.date||'','month'));
}
function awardTemplate(item, idx, prefix) {
  return frow(fld('奖项名称')+inp(prefix+'.name',item.name||'','请输入奖项名称'),fld('获得时间')+inp(prefix+'.date',item.date||'','month'));
}
function socialTemplate(item, idx, prefix) {
  return frow(fld('平台')+inp(prefix+'.platform',item.platform||'','GitHub / 掘金 / 个人网站...'),fld('链接')+inp(prefix+'.url',item.url||'','https://'));
}

// ── HTML helpers ───────────────────────────────────────────────
function fld(l) { return '<div class="field"><label>'+l+'</label>'; }
function inp(path, val, placeholder, type) {
  var t = type||'text';
  return '<input type="'+t+'" value="'+esc(val)+'" placeholder="'+(placeholder||'')+'" onchange="setVal(\''+path+'\',this.value)" oninput="setVal(\''+path+'\',this.value)"></div>';
}
function txt(path, val, placeholder) {
  return '<textarea placeholder="'+(placeholder||'')+'" onchange="setVal(\''+path+'\',this.value)" oninput="setVal(\''+path+'\',this.value)">'+esc(val)+'</textarea></div>';
}
function sel(path, val, opts) {
  var h = '';
  opts.forEach(function(o){ h += '<option value="'+o+'"'+(o===val?' selected':'')+'>'+(o||'请选择')+'</option>'; });
  return '<select onchange="setVal(\''+path+'\',this.value)">'+h+'</select></div>';
}
function frow(l,r) { return '<div class="field-row">'+l+r+'</div>'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── List builder ───────────────────────────────────────────────
function formList(key, arr, templateFn) {
  var h = '';
  arr.forEach(function(item, i){
    h += '<div class="list-item">';
    if (arr.length > 1) h += '<button class="remove-btn" onclick="removeItem(\''+key+'\','+i+')">×</button>';
    h += templateFn(item, i, key+'['+i+']');
    h += '</div>';
  });
  h += '<button class="add-btn" onclick="addItem(\''+key+'\')">+ 添加</button>';
  return h;
}

// ── Section definitions ────────────────────────────────────────
var sectionDefs = [
  { form:formInfo, icon:'👤', title:'个人信息', key:'info' },
  { form:formExpectation, icon:'🎯', title:'求职期望', key:'expectation' },
  { form:formAdvantage, icon:'✨', title:'个人优势', key:'advantage' },
  { form:formWorkExps, icon:'💼', title:'工作经历', key:'workExps' },
  { form:formInternships, icon:'📝', title:'实习经历', key:'internships' },
  { form:formEducations, icon:'🎓', title:'教育经历', key:'educations' },
  { form:formProjects, icon:'🚀', title:'项目经历', key:'projects' },
  { form:formActivities, icon:'🤝', title:'社团经历', key:'activities' },
  { form:formCerts, icon:'📜', title:'资格证书', key:'certs' },
  { form:formAwards, icon:'🏆', title:'荣誉奖项', key:'awards' },
  { form:formSocials, icon:'🔗', title:'社交主页', key:'socials' }
];

// ── Data operations ────────────────────────────────────────────
function setVal(path, val) {
  var keys = path.replace(/\[(\d+)\]/g,'.$1').split('.');
  var obj = R;
  for (var i=0; i<keys.length-1; i++) obj = obj[keys[i]];
  obj[keys[keys.length-1]] = val;
  renderPreview();
}
function addItem(key) {
  var templates = {
    workExps: {company:'',position:'',startDate:'',endDate:'',description:'',achievements:''},
    internships: {company:'',position:'',startDate:'',endDate:'',description:'',achievements:''},
    educations: {school:'',major:'',degree:'',startDate:'',endDate:''},
    projects: {name:'',role:'',startDate:'',endDate:'',description:'',achievements:''},
    activities: {orgName:'',role:'',startDate:'',endDate:'',description:''},
    certs: {name:'',date:''},
    awards: {name:'',date:''},
    socials: {platform:'',url:''}
  };
  R[key].push(JSON.parse(JSON.stringify(templates[key])));
  renderEditor();
  renderPreview();
}
function removeItem(key, idx) { R[key].splice(idx, 1); renderEditor(); renderPreview(); }

function renderEditor() {
  var h = '';
  sectionDefs.forEach(function(sec){
    h += '<div class="editor-section" data-section="'+sec.key+'">';
    h += '<div class="editor-section-title"><span class="sec-icon">'+sec.icon+'</span> '+sec.title+'</div>';
    h += sec.form()+'</div>';
  });
  document.getElementById('editor-body').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════════
//  Helpers for new templates
// ═══════════════════════════════════════════════════════════════
function avatarImg(cls, url, name) {
  if (url) return '<div class="'+cls+'"><img src="'+esc(url)+'" style="width:100%;height:100%;object-fit:cover;"></div>';
  var initial = name ? name[0] : '👤';
  return '<div class="'+cls+'">'+initial+'</div>';
}
function toBullets(text, cls) {
  if (!text) return '';
  var lines = text.split('\n').filter(function(l){ return l.trim(); });
  if (!lines.length) return '';
  var h = '<ul class="'+cls+'">';
  lines.forEach(function(line){
    h += '<li>'+esc(line.trim().replace(/^[-•*]\s*/,''))+'</li>';
  });
  h += '</ul>';
  return h;
}
function skillLevel(name) {
  if (name.indexOf('精通') >= 0) return { pct: 95, label: '精通' };
  if (name.indexOf('熟练') >= 0) return { pct: 80, label: '熟练' };
  if (name.indexOf('良好') >= 0) return { pct: 65, label: '良好' };
  if (name.indexOf('了解') >= 0) return { pct: 40, label: '了解' };
  if (name.indexOf('基础') >= 0) return { pct: 30, label: '基础' };
  return { pct: 60, label: '一般' };
}
function cleanSkillName(name) {
  return name.replace(/[（(].*?[）)]/g, '').trim();
}

// ═══════════════════════════════════════════════════════════════
//  Template 1
// ═══════════════════════════════════════════════════════════════
function renderT1() {
  var i = R.info, e = R.expectation;
  var h = '';
  h += '<div class="t1-header-top"></div>';
  h += avatarImg('t1-avatar', i.avatar, i.name);
  h += '<div class="t1-name">'+(i.name||'姓名')+'</div>';
  var contacts = [];
  if (i.phone) contacts.push(i.phone);
  if (i.email) contacts.push(i.email);
  if (contacts.length) h += '<div class="t1-contact">'+contacts.join(' | ')+'</div>';
  if (e.position) h += '<div class="t1-job">'+esc(e.position)+'</div>';
  h += '<div class="t1-main">';
  if (R.advantage) {
    h += '<div class="t1-sec"><div class="t1-sec-title">个人总结</div>';
    h += '<div class="t1-desc">'+esc(R.advantage).replace(/\n/g,'<br>')+'</div></div>';
  }
  if (R.workExps.length) {
    h += '<div class="t1-sec"><div class="t1-sec-title">工作经历</div>';
    R.workExps.forEach(function(w){
      h += '<div class="t1-item">';
      h += '<div class="t1-item-hd"><span class="t1-item-title">'+esc(w.company)+' · '+esc(w.position)+'</span></div>';
      h += '<div class="t1-item-sub">'+esc(w.startDate)+' — '+esc(w.endDate||'至今')+'</div>';
      h += toBullets(w.description, 't1-bullets');
      if (w.achievements) h += toBullets(w.achievements, 't1-bullets');
      h += '</div>';
    });
    h += '</div>';
  }
  if (R.internships.length) {
    h += '<div class="t1-sec"><div class="t1-sec-title">实习经历</div>';
    R.internships.forEach(function(w){
      h += '<div class="t1-item">';
      h += '<div class="t1-item-hd"><span class="t1-item-title">'+esc(w.company)+' · '+esc(w.position)+'</span></div>';
      h += '<div class="t1-item-sub">'+esc(w.startDate)+' — '+esc(w.endDate||'至今')+'</div>';
      h += toBullets(w.description, 't1-bullets');
      if (w.achievements) h += toBullets(w.achievements, 't1-bullets');
      h += '</div>';
    });
    h += '</div>';
  }
  if (R.projects.length) {
    h += '<div class="t1-sec"><div class="t1-sec-title">项目经历</div>';
    R.projects.forEach(function(p){
      h += '<div class="t1-item">';
      h += '<div class="t1-item-hd"><span class="t1-item-title">'+esc(p.name)+'</span><span class="t1-item-loc">'+esc(p.role||'')+'</span></div>';
      h += '<div class="t1-item-sub">'+esc(p.startDate)+' — '+esc(p.endDate||'至今')+'</div>';
      h += toBullets(p.description, 't1-bullets');
      if (p.achievements) h += toBullets(p.achievements, 't1-bullets');
      h += '</div>';
    });
    h += '</div>';
  }
  if (R.educations.length) {
    h += '<div class="t1-sec"><div class="t1-sec-title">教育经历</div>';
    R.educations.forEach(function(ed){
      h += '<div class="t1-item">';
      h += '<div class="t1-item-hd"><span class="t1-item-title">'+esc(ed.school)+'</span><span class="t1-item-loc">'+esc(ed.degree||'')+'</span></div>';
      h += '<div class="t1-item-sub">'+esc(ed.major)+' · '+esc(ed.startDate)+' — '+esc(ed.endDate)+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }
  if (R.activities.length) {
    h += '<div class="t1-sec"><div class="t1-sec-title">社团经历</div>';
    R.activities.forEach(function(a){
      h += '<div class="t1-item">';
      h += '<div class="t1-item-hd"><span class="t1-item-title">'+esc(a.orgName)+'</span><span class="t1-item-loc">'+esc(a.role||'')+'</span></div>';
      h += '<div class="t1-item-sub">'+esc(a.startDate)+' — '+esc(a.endDate)+'</div>';
      h += toBullets(a.description, 't1-bullets');
      h += '</div>';
    });
    h += '</div>';
  }
  var allAwards = [];
  R.awards.forEach(function(a){ if(a.name) allAwards.push(a.name); });
  if (allAwards.length) {
    h += '<div class="t1-sec"><div class="t1-sec-title">荣誉奖项</div>';
    h += '<ul class="t1-bullets">';
    allAwards.forEach(function(a){ h += '<li>'+esc(a)+'</li>'; });
    h += '</ul></div>';
  }
  var allCerts = [];
  R.certs.forEach(function(c){ if(c.name) allCerts.push(c.name); });
  if (allCerts.length) {
    h += '<div class="t1-sec"><div class="t1-sec-title">技能证书</div>';
    h += '<ul class="t1-bullets">';
    allCerts.forEach(function(c){ h += '<li>'+esc(c)+'</li>'; });
    h += '</ul></div>';
  }
  if (R.socials.length) {
    var socialItems = R.socials.filter(function(s){ return s.url; });
    if (socialItems.length) {
      h += '<div class="t1-sec"><div class="t1-sec-title">社交主页</div>';
      h += '<div class="t1-desc">';
      socialItems.forEach(function(s){ h += esc(s.platform)+'：'+esc(s.url)+'<br>'; });
      h += '</div></div>';
    }
  }
  h += '</div>';
  document.getElementById('resume-preview').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════════
//  Template 2
// ═══════════════════════════════════════════════════════════════
function renderT2() {
  var i = R.info, e = R.expectation;
  var h = '';
  h += '<div class="t2-sidebar">';
  h += avatarImg('t2-sidebar-avatar', i.avatar, i.name);
  h += '<div class="t2-sidebar-name">'+(i.name||'姓名')+'</div>';
  if (e.position) h += '<div class="t2-sidebar-job">求职岗位：'+esc(e.position)+'</div>';
  h += '<div class="t2-sidebar-divider"></div>';
  h += '<div class="t2-sidebar-info">';
  if (i.birthday) h += '<div class="t2-sidebar-info-item"><span class="t2-sidebar-info-icon">📅</span>'+esc(i.birthday)+'</div>';
  if (i.gender) h += '<div class="t2-sidebar-info-item"><span class="t2-sidebar-info-icon">⚧</span>'+esc(i.gender)+'</div>';
  if (i.hometown) h += '<div class="t2-sidebar-info-item"><span class="t2-sidebar-info-icon">📍</span>'+esc(i.hometown)+'</div>';

// ═══════════════════════════════════════════════════════════════
//  Preview dispatcher
// ═══════════════════════════════════════════════════════════════
function renderPreview() {
  switch(currentTemplate) {
    case '1': renderT1(); break;
    case '2': renderT2(); break;
    case '3': renderT3(); break;
    case '4': renderT4(); break;
    case '5': renderT5(); break;
    default: renderT1();
  }
}

// ═══════════════════════════════════════════════════════════════
//  Template switching
// ═══════════════════════════════════════════════════════════════
function setTemplate(tpl) {
  currentTemplate = tpl;
  var paper = document.getElementById('resume-preview');
  paper.className = 'resume-paper tpl-'+tpl;
  document.querySelectorAll('.tpl-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.tpl === tpl);
  });
  localStorage.setItem('auto_offer_template', tpl);
  renderPreview();
}

// ═══════════════════════════════════════════════════════════════
//  Sidebar navigation — scroll to section
// ═══════════════════════════════════════════════════════════════
document.addEventListener('click', function(e){
  var navBtn = e.target.closest('.nav-item[data-sec]');
  if (!navBtn) return;
  document.querySelectorAll('.nav-item[data-sec]').forEach(function(b){ b.classList.remove('active'); });
  navBtn.classList.add('active');
  var secKey = navBtn.dataset.sec;
  var target = document.querySelector('.editor-section[data-section="'+secKey+'"]');
  if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    target.style.borderColor = 'var(--lavender)';
    setTimeout(function(){ target.style.borderColor = ''; }, 1200);
  }
});

// ═══════════════════════════════════════════════════════════════
//  Persist
// ═══════════════════════════════════════════════════════════════
function saveLocal() { localStorage.setItem('auto_offer_resume', JSON.stringify(R)); toast('简历已保存到本地'); }
function loadLocal() {
  var raw = localStorage.getItem('auto_offer_resume');
  if (raw) {
    try {
      var saved = JSON.parse(raw);
      Object.keys(saved).forEach(function(k){ if (R.hasOwnProperty(k)) R[k] = saved[k]; });
      renderEditor(); renderPreview();
      toast('简历已加载');
    } catch(e) { toast('加载失败'); }
  } else { toast('没有保存的简历'); }
}
function printResume() { window.print(); }
function toast(msg) {
  var t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2000);
}

document.getElementById('tpl-group').addEventListener('click', function(e){
  var btn = e.target.closest('.tpl-btn');
  if (!btn) return;
  setTemplate(btn.dataset.tpl);
});

var savedTpl = localStorage.getItem('auto_offer_template');
if (savedTpl && ['1','2','3','4','5'].indexOf(savedTpl) >= 0) {
  setTemplate(savedTpl);
}

var saved = localStorage.getItem('auto_offer_resume');
if (saved) {
  try {
    var parsed = JSON.parse(saved);
    Object.keys(parsed).forEach(function(k){ if (R.hasOwnProperty(k)) R[k] = parsed[k]; });
  } catch(e) {}
}

renderEditor();
renderPreview();
</script>
</body>
</html>
