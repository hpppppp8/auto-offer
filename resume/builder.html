<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>简历生成器 — Auto Offer</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   Design tokens
   ═══════════════════════════════════════════════════════════════ */
:root {
  --bg:#141118; --surface:#1e1b24; --surface2:#25222d; --surface3:#2d2936;
  --border:#302c39; --text:#fff; --text2:#b0acb9; --text3:#787380;
  --lavender:#b8a9d4; --mint:#7ecba1; --cream:#f0d78c; --rose:#e8998d;
  --radius:18px; --radius-sm:12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg); color:var(--text); line-height:1.5;
  -webkit-font-smoothing:antialiased; display:flex; flex-direction:column; height:100vh; overflow:hidden;
}

/* Top bar */
.topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; }
.topbar-left { display:flex; align-items:center; gap:12px; }
.topbar-left h1 { font-size:16px; font-weight:600; }
.topbar-right { display:flex; align-items:center; gap:8px; }

/* Template picker */
.tpl-group { display:flex; gap:2px; background:var(--surface2); border-radius:10px; padding:3px; }
.tpl-btn { padding:5px 12px; border-radius:8px; border:none; background:transparent; color:var(--text2); cursor:pointer; font-size:12px; font-family:inherit; font-weight:500; transition:all .15s; white-space:nowrap; }
.tpl-btn:hover { color:var(--text); }
.tpl-btn.active { background:var(--surface3); color:var(--lavender); }

/* Buttons */
.btn { padding:7px 18px; border-radius:980px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .15s; }
.btn-primary { background:var(--lavender); color:var(--bg); }
.btn-primary:hover { opacity:.85; }
.btn-ghost { background:var(--surface3); color:var(--text2); }
.btn-ghost:hover { background:var(--border); }
.btn-small { padding:4px 12px; font-size:12px; }

/* Main layout */
.main { flex:1; display:flex; min-height:0; }
.editor { width:460px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.editor-body { flex:1; overflow-y:auto; padding:16px 20px; }
.editor-section { margin-bottom:28px; }
.editor-section-title { font-size:14px; font-weight:600; color:var(--lavender); margin-bottom:12px; display:flex; align-items:center; gap:6px; padding-bottom:8px; border-bottom:1px solid var(--border); }
.editor-section-title .sec-icon { font-size:16px; }
.preview { flex:1; display:flex; align-items:flex-start; justify-content:center; padding:28px; overflow-y:auto; background:var(--bg); }

/* Form elements */
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; font-weight:500; color:var(--text3); margin-bottom:4px; text-transform:uppercase; letter-spacing:.3px; }
.field input, .field textarea, .field select {
  width:100%; padding:9px 14px; border-radius:var(--radius-sm); font-size:14px; font-family:inherit;
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  outline:none; transition:border-color .15s; resize:vertical;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color:var(--lavender); }
.field textarea { min-height:80px; }
.field-row { display:flex; gap:10px; }
.field-row .field { flex:1; }

.list-item { background:var(--surface2); border-radius:var(--radius-sm); padding:14px; margin-bottom:10px; border:1px solid var(--border); position:relative; }
.list-item .remove-btn { position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:50%; background:var(--surface3); border:none; color:var(--text3); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.list-item .remove-btn:hover { background:var(--rose); color:#fff; }
.add-btn { width:100%; padding:10px; border-radius:var(--radius-sm); border:1px dashed var(--border); background:transparent; color:var(--text3); cursor:pointer; font-size:13px; font-family:inherit; transition:all .15s; }
.add-btn:hover { border-color:var(--lavender); color:var(--lavender); background:rgba(184,169,212,.06); }

/* ═══════════════════════════════════════════════════════════════
   Resume paper — base (shared sizing, shadow)
   ═══════════════════════════════════════════════════════════════ */
.resume-paper {
  width:794px; min-height:1123px; background:#fff;
  box-shadow:0 4px 40px rgba(0,0,0,.5); border-radius:2px;
  color:#333; font-size:14px; line-height:1.7;
  font-family:'PingFang SC','Microsoft YaHei',sans-serif;
  transition:all .3s ease;
}

/* ═══════════════════════════════════════════════════════════════
   Template: Classic — 经典传统
   Centered name, thick section borders, professional ATS style
   ═══════════════════════════════════════════════════════════════ */
.resume-paper.tpl-classic { padding:56px 64px; color:#333; }
.resume-paper.tpl-classic .rp-cl-header { text-align:center; margin-bottom:30px; }
.resume-paper.tpl-classic .rp-cl-name { font-size:28px; font-weight:700; letter-spacing:2px; color:#1a1a1a; margin-bottom:10px; }
.resume-paper.tpl-classic .rp-cl-job { font-size:15px; color:#555; margin-bottom:10px; }
.resume-paper.tpl-classic .rp-cl-contact { font-size:13px; color:#777; display:flex; justify-content:center; gap:20px; flex-wrap:wrap; }
.resume-paper.tpl-classic .rp-cl-contact span::before { content:'●'; font-size:6px; position:relative; top:-2px; margin-right:8px; color:#bbb; }
.resume-paper.tpl-classic .rp-cl-contact span:first-child::before { display:none; }
.resume-paper.tpl-classic .rp-cl-sec { margin-bottom:24px; }
.resume-paper.tpl-classic .rp-cl-sec-title { font-size:15px; font-weight:700; color:#1a1a1a; border-bottom:2px solid #333; padding-bottom:4px; margin-bottom:12px; letter-spacing:1px; display:flex; align-items:center; gap:8px; }
.resume-paper.tpl-classic .rp-cl-sec-title .sec-decor { font-size:18px; }
.resume-paper.tpl-classic .rp-cl-item { margin-bottom:14px; padding-left:2px; }
.resume-paper.tpl-classic .rp-cl-item-hd { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:3px; }
.resume-paper.tpl-classic .rp-cl-item-title { font-weight:600; font-size:15px; color:#222; }
.resume-paper.tpl-classic .rp-cl-item-sub { color:#555; font-size:13px; }
.resume-paper.tpl-classic .rp-cl-item-date { color:#888; font-size:12px; white-space:nowrap; }
.resume-paper.tpl-classic .rp-cl-item-desc { color:#444; font-size:13px; margin-top:4px; }
.resume-paper.tpl-classic .rp-cl-tags { display:flex; flex-wrap:wrap; gap:8px; }
.resume-paper.tpl-classic .rp-cl-tag { padding:3px 12px; background:#f4f4f4; border:1px solid #e0e0e0; border-radius:3px; font-size:12px; color:#555; }

/* ═══════════════════════════════════════════════════════════════
   Template: Modern — 现代侧栏
   Left sidebar with gradient, right content area
   ═══════════════════════════════════════════════════════════════ */
.resume-paper.tpl-modern { padding:0; display:flex; }
.resume-paper.tpl-modern .rp-md-sidebar {
  width:210px; flex-shrink:0;
  background:linear-gradient(180deg, #1e3a5f 0%, #2d5a87 40%, #3d7ab5 100%);
  color:#fff; padding:40px 22px; display:flex; flex-direction:column; gap:28px;
}
.resume-paper.tpl-modern .rp-md-sidebar .md-avatar {
  width:90px; height:90px; border-radius:50%; background:rgba(255,255,255,.15);
  margin:0 auto; display:flex; align-items:center; justify-content:center;
  font-size:36px; border:3px solid rgba(255,255,255,.2);
}
.resume-paper.tpl-modern .rp-md-sidebar .md-name { font-size:22px; font-weight:700; text-align:center; letter-spacing:1px; }
.resume-paper.tpl-modern .rp-md-sidebar .md-job { font-size:13px; text-align:center; opacity:.85; }
.resume-paper.tpl-modern .rp-md-sidebar .md-block {}
.resume-paper.tpl-modern .rp-md-sidebar .md-block-title { font-size:10px; text-transform:uppercase; letter-spacing:2px; opacity:.6; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,.15); padding-bottom:4px; }
.resume-paper.tpl-modern .rp-md-sidebar .md-contact { font-size:12px; line-height:2; opacity:.9; }
.resume-paper.tpl-modern .rp-md-sidebar .md-tags { display:flex; flex-wrap:wrap; gap:5px; }
.resume-paper.tpl-modern .rp-md-sidebar .md-tag { padding:2px 10px; background:rgba(255,255,255,.12); border-radius:10px; font-size:11px; }
.resume-paper.tpl-modern .rp-md-main { flex:1; padding:40px 36px 40px 32px; color:#1e293b; }
.resume-paper.tpl-modern .rp-md-sec { margin-bottom:22px; }
.resume-paper.tpl-modern .rp-md-sec-title { font-size:14px; font-weight:700; color:#1e3a5f; border-left:3px solid #3d7ab5; padding-left:10px; margin-bottom:12px; letter-spacing:1px; display:flex; align-items:center; gap:6px; }
.resume-paper.tpl-modern .rp-md-sec-title .sec-decor { font-size:14px; }
.resume-paper.tpl-modern .rp-md-item { margin-bottom:14px; padding-left:13px; border-left:2px solid #e8edf3; }
.resume-paper.tpl-modern .rp-md-item-hd { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:2px; }
.resume-paper.tpl-modern .rp-md-item-title { font-weight:600; font-size:14px; color:#1e293b; }
.resume-paper.tpl-modern .rp-md-item-sub { color:#64748b; font-size:12px; }
.resume-paper.tpl-modern .rp-md-item-date { color:#94a3b8; font-size:11px; white-space:nowrap; }
.resume-paper.tpl-modern .rp-md-item-desc { color:#475569; font-size:12.5px; margin-top:3px; }
.resume-paper.tpl-modern .rp-md-main .rp-md-tags { display:flex; flex-wrap:wrap; gap:6px; }
.resume-paper.tpl-modern .rp-md-main .rp-md-tag { padding:3px 12px; background:#eff6ff; color:#2563eb; border-radius:12px; font-size:11px; }

/* ═══════════════════════════════════════════════════════════════
   Template: Minimal — 极简留白
   Split header, thin rules, light weight, generous space
   ═══════════════════════════════════════════════════════════════ */
.resume-paper.tpl-minimal { padding:64px 80px; background:#fafafa; color:#555; }
.resume-paper.tpl-minimal .rp-mn-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:36px; padding-bottom:20px; border-bottom:1px solid #e0e0e0; }
.resume-paper.tpl-minimal .rp-mn-name { font-size:24px; font-weight:300; letter-spacing:4px; color:#222; }
.resume-paper.tpl-minimal .rp-mn-info { text-align:right; }
.resume-paper.tpl-minimal .rp-mn-job { font-size:13px; color:#999; margin-bottom:6px; }
.resume-paper.tpl-minimal .rp-mn-contact { font-size:11px; color:#bbb; line-height:1.8; }
.resume-paper.tpl-minimal .rp-mn-sec { margin-bottom:32px; }
.resume-paper.tpl-minimal .rp-mn-sec-title { font-size:11px; font-weight:400; color:#999; letter-spacing:4px; text-transform:uppercase; margin-bottom:14px; }
.resume-paper.tpl-minimal .rp-mn-item { margin-bottom:16px; padding-left:24px; position:relative; }
.resume-paper.tpl-minimal .rp-mn-item::before { content:''; position:absolute; left:0; top:7px; width:6px; height:6px; border-radius:50%; background:#d0d0d0; }
.resume-paper.tpl-minimal .rp-mn-item-hd { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:2px; }
.resume-paper.tpl-minimal .rp-mn-item-title { font-weight:500; font-size:14px; color:#444; }
.resume-paper.tpl-minimal .rp-mn-item-sub { color:#aaa; font-size:12px; }
.resume-paper.tpl-minimal .rp-mn-item-date { color:#ccc; font-size:11px; white-space:nowrap; }
.resume-paper.tpl-minimal .rp-mn-item-desc { color:#999; font-size:12px; margin-top:3px; }
.resume-paper.tpl-minimal .rp-mn-tags { display:flex; flex-wrap:wrap; gap:10px; }
.resume-paper.tpl-minimal .rp-mn-tag { padding:2px 0; font-size:11px; color:#999; border-bottom:1px solid #e0e0e0; }

/* ═══════════════════════════════════════════════════════════════
   Template: Compact — 紧凑高效
   All-in-one header, two-column hints, minimal space
   ═══════════════════════════════════════════════════════════════ */
.resume-paper.tpl-compact { padding:36px 44px; font-size:12px; line-height:1.5; color:#222; }
.resume-paper.tpl-compact .rp-cp-header { display:flex; align-items:baseline; gap:0; margin-bottom:16px; padding-bottom:10px; border-bottom:2px solid #111; }
.resume-paper.tpl-compact .rp-cp-name { font-size:20px; font-weight:700; margin-right:auto; }
.resume-paper.tpl-compact .rp-cp-job { font-size:12px; color:#555; margin-right:16px; }
.resume-paper.tpl-compact .rp-cp-contact { font-size:10px; color:#888; white-space:nowrap; }
.resume-paper.tpl-compact .rp-cp-sec { margin-bottom:0; }
.resume-paper.tpl-compact .rp-cp-sec-title { font-size:12px; font-weight:700; color:#111; float:left; width:70px; clear:left; padding-top:5px; letter-spacing:.5px; }
.resume-paper.tpl-compact .rp-cp-sec-content { margin-left:80px; padding-top:5px; }
.resume-paper.tpl-compact .rp-cp-item { margin-bottom:8px; }
.resume-paper.tpl-compact .rp-cp-item-hd { display:flex; justify-content:space-between; align-items:baseline; }
.resume-paper.tpl-compact .rp-cp-item-title { font-weight:600; font-size:12px; }
.resume-paper.tpl-compact .rp-cp-item-sub { color:#555; font-size:10px; }
.resume-paper.tpl-compact .rp-cp-item-date { color:#888; font-size:10px; white-space:nowrap; }
.resume-paper.tpl-compact .rp-cp-item-desc { color:#555; font-size:11px; margin-top:1px; }
.resume-paper.tpl-compact .rp-cp-tags { display:flex; flex-wrap:wrap; gap:4px; }
.resume-paper.tpl-compact .rp-cp-tag { padding:1px 8px; background:#f5f5f5; border:1px solid #e0e0e0; border-radius:2px; font-size:10px; color:#555; }
.resume-paper.tpl-compact .rp-cp-sec::after { content:''; display:table; clear:both; }

/* ═══════════════════════════════════════════════════════════════
   Print
   ═══════════════════════════════════════════════════════════════ */
@media print {
  body { background:#fff; }
  .editor,.topbar { display:none !important; }
  .preview { padding:0; overflow:visible; }
  .resume-paper { box-shadow:none; width:100%; min-height:0; border-radius:0; }
  .resume-paper.tpl-minimal { padding:40px 60px; }
  .resume-paper.tpl-compact { padding:28px 36px; }
}

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface2); color:var(--text); padding:10px 20px; border-radius:980px; font-size:13px; z-index:999; border:1px solid var(--border); box-shadow:0 4px 20px rgba(0,0,0,.4); animation:toastIn .3s ease; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }

@media (max-width:1200px) { .editor { width:380px; } .resume-paper { width:100%; } }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <h1>简历生成器</h1>
    <div class="tpl-group" id="tpl-group">
      <button class="tpl-btn active" data-tpl="classic">经典</button>
      <button class="tpl-btn" data-tpl="modern">现代</button>
      <button class="tpl-btn" data-tpl="minimal">极简</button>
      <button class="tpl-btn" data-tpl="compact">紧凑</button>
    </div>
  </div>
  <div class="topbar-right">
    <button class="btn btn-ghost btn-small" onclick="saveLocal()">保存</button>
    <button class="btn btn-ghost btn-small" onclick="loadLocal()">加载</button>
    <button class="btn btn-primary btn-small" onclick="printResume()">打印PDF</button>
  </div>
</div>

<div class="main">
<div class="editor">
  <div class="editor-body" id="editor-body"></div>
</div>

<div class="preview">
  <div class="resume-paper tpl-classic" id="resume-preview"></div>
</div>
</div>

<script>
var R = {
  info: { name:'', birthday:'', gender:'', email:'', phone:'', wechat:'', hometown:'', political:'', workStart:'', avatar:'' },
  expectation: { position:'', city:'', salary:'' },
  advantage: '',
  workExps: [],
  internships: [],
  educations: [],
  projects: [],
  activities: [],
  certs: [],
  awards: [],
  socials: []
};
var currentTemplate = 'classic';

// ── Form builders ──────────────────────────────────────────────
function formInfo() {
  var d = R.info;
  return fld('姓名')+inp('info.name',d.name,'请输入姓名')+
    frow(fld('生日')+inp('info.birthday',d.birthday,'','date'),fld('性别')+sel('info.gender',d.gender,['','男','女']))+
    frow(fld('邮箱')+inp('info.email',d.email,'请输入邮箱','email'),fld('电话')+inp('info.phone',d.phone,'请输入电话','tel'))+
    frow(fld('微信号')+inp('info.wechat',d.wechat,'请输入微信号'),fld('籍贯')+inp('info.hometown',d.hometown,'请输入籍贯'))+
    frow(fld('政治面貌')+sel('info.political',d.political,['','群众','共青团员','共产党员','民主党派','无党派人士']),fld('参加工作时间')+inp('info.workStart',d.workStart,'','month'));
}
function formExpectation() {
  var d = R.expectation;
  return fld('期望职位')+inp('expectation.position',d.position,'请输入职位关键词')+
    fld('期望城市')+inp('expectation.city',d.city,'例如：杭州')+
    fld('薪资要求')+inp('expectation.salary',d.salary,'例如：15k-25k 或 面议');
}
function formAdvantage() { return fld('个人优势 / 自我评价')+txt('advantage',R.advantage,'描述你的核心竞争力、专业特长...'); }
function formWorkExps() { return formList('workExps', R.workExps, workExpTemplate); }
function formInternships() { return formList('internships', R.internships, internshipTemplate); }
function formEducations() { return formList('educations', R.educations, educationTemplate); }
function formProjects() { return formList('projects', R.projects, projectTemplate); }
function formActivities() { return formList('activities', R.activities, activityTemplate); }
function formCerts() { return formList('certs', R.certs, certTemplate); }
function formAwards() { return formList('awards', R.awards, awardTemplate); }
function formSocials() { return formList('socials', R.socials, socialTemplate); }

// ── Item templates ─────────────────────────────────────────────
function workExpTemplate(item, idx, prefix) {
  return frow(fld('公司名称')+inp(prefix+'.company',item.company||'','请输入公司名称'),fld('职位')+inp(prefix+'.position',item.position||'','请输入职位'))+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','','month'))+
    fld('工作内容')+txt(prefix+'.description',item.description||'','描述主要工作职责和内容')+
    fld('工作成果')+txt(prefix+'.achievements',item.achievements||'','量化成果，如业绩提升、项目成果');
}
function internshipTemplate(item, idx, prefix) { return workExpTemplate(item, idx, prefix); }
function educationTemplate(item, idx, prefix) {
  return frow(fld('学校')+inp(prefix+'.school',item.school||'','请输入学校名称'),fld('专业')+inp(prefix+'.major',item.major||'','请输入专业'))+
    frow(fld('学历')+sel(prefix+'.degree',item.degree||'',['','大专','本科','硕士','博士','中专/中技','高中','初中及以下']),fld('')+'')+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','','month'));
}
function projectTemplate(item, idx, prefix) {
  return frow(fld('项目名称')+inp(prefix+'.name',item.name||'','请输入项目名称'),fld('担任角色')+inp(prefix+'.role',item.role||'','请输入角色'))+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','','month'))+
    fld('项目描述')+txt(prefix+'.description',item.description||'','描述项目背景、目标、技术栈')+
    fld('项目成果')+txt(prefix+'.achievements',item.achievements||'','个人贡献和量化成果');
}
function activityTemplate(item, idx, prefix) {
  return frow(fld('组织名称')+inp(prefix+'.orgName',item.orgName||'','请输入组织名称'),fld('担任角色')+inp(prefix+'.role',item.role||'','请输入角色'))+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','','month'))+
    fld('经历描述')+txt(prefix+'.description',item.description||'','描述活动内容和收获');
}
function certTemplate(item, idx, prefix) {
  return frow(fld('证书名称')+inp(prefix+'.name',item.name||'','请输入证书名称'),fld('获得时间')+inp(prefix+'.date',item.date||'','month'));
}
function awardTemplate(item, idx, prefix) {
  return frow(fld('奖项名称')+inp(prefix+'.name',item.name||'','请输入奖项名称'),fld('获得时间')+inp(prefix+'.date',item.date||'','month'));
}
function socialTemplate(item, idx, prefix) {
  return frow(fld('平台')+inp(prefix+'.platform',item.platform||'','GitHub / 掘金 / 个人网站...'),fld('链接')+inp(prefix+'.url',item.url||'','https://'));
}

// ── HTML helpers ───────────────────────────────────────────────
function fld(l) { return '<div class="field"><label>'+l+'</label>'; }
function inp(path, val, placeholder, type) {
  var t = type||'text';
  return '<input type="'+t+'" value="'+esc(val)+'" placeholder="'+(placeholder||'')+'" onchange="setVal(\''+path+'\',this.value)" oninput="setVal(\''+path+'\',this.value)"></div>';
}
function txt(path, val, placeholder) {
  return '<textarea placeholder="'+(placeholder||'')+'" onchange="setVal(\''+path+'\',this.value)" oninput="setVal(\''+path+'\',this.value)">'+esc(val)+'</textarea></div>';
}
function sel(path, val, opts) {
  var h = '';
  opts.forEach(function(o){ h += '<option value="'+o+'"'+(o===val?' selected':'')+'>'+(o||'请选择')+'</option>'; });
  return '<select onchange="setVal(\''+path+'\',this.value)">'+h+'</select></div>';
}
function frow(l,r) { return '<div class="field-row">'+l+r+'</div>'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── List builder ───────────────────────────────────────────────
function formList(key, arr, templateFn) {
  var h = '';
  arr.forEach(function(item, i){
    h += '<div class="list-item">';
    if (arr.length > 1) h += '<button class="remove-btn" onclick="removeItem(\''+key+'\','+i+')">×</button>';
    h += templateFn(item, i, key+'['+i+']');
    h += '</div>';
  });
  h += '<button class="add-btn" onclick="addItem(\''+key+'\')">+ 添加</button>';
  return h;
}

// ── Section definitions ────────────────────────────────────────
var sectionDefs = [
  { form:formInfo, icon:'👤', title:'个人信息' },
  { form:formExpectation, icon:'🎯', title:'求职期望' },
  { form:formAdvantage, icon:'✨', title:'个人优势' },
  { form:formWorkExps, icon:'💼', title:'工作经历' },
  { form:formInternships, icon:'📝', title:'实习经历' },
  { form:formEducations, icon:'🎓', title:'教育经历' },
  { form:formProjects, icon:'🚀', title:'项目经历' },
  { form:formActivities, icon:'🤝', title:'社团经历' },
  { form:formCerts, icon:'📜', title:'资格证书' },
  { form:formAwards, icon:'🏆', title:'荣誉奖项' },
  { form:formSocials, icon:'🔗', title:'社交主页' }
];

// ── Data operations ────────────────────────────────────────────
function setVal(path, val) {
  var keys = path.replace(/\[(\d+)\]/g,'.$1').split('.');
  var obj = R;
  for (var i=0; i<keys.length-1; i++) obj = obj[keys[i]];
  obj[keys[keys.length-1]] = val;
  renderPreview();
}
function addItem(key) {
  var templates = {
    workExps: {company:'',position:'',startDate:'',endDate:'',description:'',achievements:''},
    internships: {company:'',position:'',startDate:'',endDate:'',description:'',achievements:''},
    educations: {school:'',major:'',degree:'',startDate:'',endDate:''},
    projects: {name:'',role:'',startDate:'',endDate:'',description:'',achievements:''},
    activities: {orgName:'',role:'',startDate:'',endDate:'',description:''},
    certs: {name:'',date:''},
    awards: {name:'',date:''},
    socials: {platform:'',url:''}
  };
  R[key].push(JSON.parse(JSON.stringify(templates[key])));
  renderEditor();
  renderPreview();
}
function removeItem(key, idx) { R[key].splice(idx, 1); renderEditor(); renderPreview(); }

function renderEditor() {
  var h = '';
  sectionDefs.forEach(function(sec){
    h += '<div class="editor-section"><div class="editor-section-title"><span class="sec-icon">'+sec.icon+'</span> '+sec.title+'</div>';
    h += sec.form()+'</div>';
  });
  document.getElementById('editor-body').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════════
//  Section rendering helpers (shared by templates)
// ═══════════════════════════════════════════════════════════════
function secWorkExp(prefix, title, icon, exps) {
  if (!exps.length) return '';
  var h = '<div class="'+prefix+'-sec"><div class="'+prefix+'-sec-title"><span class="sec-decor">'+icon+'</span> '+title+'</div>';
  exps.forEach(function(w){
    h += '<div class="'+prefix+'-item"><div class="'+prefix+'-item-hd"><span class="'+prefix+'-item-title">'+esc(w.company)+'</span><span class="'+prefix+'-item-date">'+esc(w.startDate)+' — '+(esc(w.endDate)||'至今')+'</span></div>';
    h += '<div class="'+prefix+'-item-sub">'+esc(w.position)+'</div>';
    if (w.description) h += '<div class="'+prefix+'-item-desc">'+esc(w.description)+'</div>';
    if (w.achievements) h += '<div class="'+prefix+'-item-desc">★ '+esc(w.achievements)+'</div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}
function secEducation(prefix, title, icon, eds) {
  if (!eds.length) return '';
  var h = '<div class="'+prefix+'-sec"><div class="'+prefix+'-sec-title"><span class="sec-decor">'+icon+'</span> '+title+'</div>';
  eds.forEach(function(ed){
    h += '<div class="'+prefix+'-item"><div class="'+prefix+'-item-hd"><span class="'+prefix+'-item-title">'+esc(ed.school)+'</span><span class="'+prefix+'-item-date">'+esc(ed.startDate)+' — '+esc(ed.endDate)+'</span></div>';
    h += '<div class="'+prefix+'-item-sub">'+esc(ed.major)+(ed.degree?' · '+ed.degree:'')+'</div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}
function secProjects(prefix, title, icon, projs) {
  if (!projs.length) return '';
  var h = '<div class="'+prefix+'-sec"><div class="'+prefix+'-sec-title"><span class="sec-decor">'+icon+'</span> '+title+'</div>';
  projs.forEach(function(p){
    h += '<div class="'+prefix+'-item"><div class="'+prefix+'-item-hd"><span class="'+prefix+'-item-title">'+esc(p.name)+'</span><span class="'+prefix+'-item-date">'+esc(p.startDate)+' — '+esc(p.endDate)+'</span></div>';
    if (p.role) h += '<div class="'+prefix+'-item-sub">'+esc(p.role)+'</div>';
    if (p.description) h += '<div class="'+prefix+'-item-desc">'+esc(p.description)+'</div>';
    if (p.achievements) h += '<div class="'+prefix+'-item-desc">★ '+esc(p.achievements)+'</div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}
function secActivities(prefix, title, icon, acts) {
  if (!acts.length) return '';
  var h = '<div class="'+prefix+'-sec"><div class="'+prefix+'-sec-title"><span class="sec-decor">'+icon+'</span> '+title+'</div>';
  acts.forEach(function(a){
    h += '<div class="'+prefix+'-item"><div class="'+prefix+'-item-hd"><span class="'+prefix+'-item-title">'+esc(a.orgName)+'</span><span class="'+prefix+'-item-date">'+esc(a.startDate)+' — '+esc(a.endDate)+'</span></div>';
    if (a.role) h += '<div class="'+prefix+'-item-sub">'+esc(a.role)+'</div>';
    if (a.description) h += '<div class="'+prefix+'-item-desc">'+esc(a.description)+'</div>';
    h += '</div>';
  });
  h += '</div>';
  return h;
}
function secTags(prefix, title, icon, certs, awards) {
  var tags = [];
  certs.forEach(function(c){ if(c.name) tags.push(c.name); });
  awards.forEach(function(a){ if(a.name) tags.push(a.name); });
  if (!tags.length) return '';
  var h = '<div class="'+prefix+'-sec"><div class="'+prefix+'-sec-title"><span class="sec-decor">'+icon+'</span> '+title+'</div>';
  h += '<div class="'+prefix+'-tags">';
  tags.forEach(function(t){ h += '<span class="'+prefix+'-tag">'+esc(t)+'</span>'; });
  h += '</div></div>';
  return h;
}
function secSocials(prefix, title, icon, socials) {
  if (!socials.length) return '';
  var h = '<div class="'+prefix+'-sec"><div class="'+prefix+'-sec-title"><span class="sec-decor">'+icon+'</span> '+title+'</div>';
  socials.forEach(function(s){
    if (s.url) h += '<div class="'+prefix+'-item-desc">'+esc(s.platform)+': '+esc(s.url)+'</div>';
  });
  h += '</div>';
  return h;
}

// ═══════════════════════════════════════════════════════════════
//  Template: Classic 经典
// ═══════════════════════════════════════════════════════════════
function renderClassic() {
  var i = R.info, e = R.expectation, p = 'rp-cl';
  var contactItems = [i.email, i.phone, i.wechat, i.hometown].filter(Boolean);
  var h = '<div class="'+p+'-header">';
  h += '<div class="'+p+'-name">'+(i.name||'姓名')+'</div>';
  if (e.position) h += '<div class="'+p+'-job">求职意向：'+esc(e.position)+' · '+esc(e.city)+(e.salary?' · '+esc(e.salary):'')+'</div>';
  h += '<div class="'+p+'-contact">';
  contactItems.forEach(function(c){ h += '<span>'+esc(c)+'</span>'; });
  if (i.birthday || i.gender || i.political) {
    var extra = [i.gender, i.birthday, i.political].filter(Boolean).join(' · ');
    h += '<span>'+esc(extra)+'</span>';
  }
  h += '</div></div>';

  if (R.advantage) {
    h += '<div class="'+p+'-sec"><div class="'+p+'-sec-title"><span class="sec-decor">✨</span> 个人优势</div>';

  document.getElementById('resume-preview').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════════
//  Template: Modern 现代
// ═══════════════════════════════════════════════════════════════
function renderModern() {
  var i = R.info, e = R.expectation;
  var contactLines = [i.email, i.phone, i.wechat, i.hometown].filter(Boolean);
  var h = '';

  // Sidebar
  h += '<div class="rp-md-sidebar">';
  h += '<div class="md-avatar">'+(i.avatar||'👤')+'</div>';
  h += '<div class="md-name">'+(i.name||'姓名')+'</div>';
  if (e.position) h += '<div class="md-job">'+esc(e.position)+'</div>';
  if (contactLines.length) {
    h += '<div class="md-block"><div class="md-block-title">联系方式</div>';
    h += '<div class="md-contact">';
    contactLines.forEach(function(c){ h += esc(c)+'<br>'; });
    if (i.birthday || i.gender) {
      var extra = [i.gender, i.birthday].filter(Boolean).join(' · ');
      h += esc(extra)+'<br>';
    }
    h += '</div></div>';
  }
  if (e.city || e.salary) {
    h += '<div class="md-block"><div class="md-block-title">求职意向</div>';
    h += '<div class="md-contact">'+[e.city, e.salary].filter(Boolean).join('<br>')+'</div></div>';
  }
  // Skills in sidebar
  var tags = [];
  R.certs.forEach(function(c){ if(c.name) tags.push(c.name); });
  R.awards.forEach(function(a){ if(a.name) tags.push(a.name); });
  if (tags.length) {
    h += '<div class="md-block"><div class="md-block-title">技能 & 证书</div>';
    h += '<div class="md-tags">';
    tags.forEach(function(t){ h += '<span class="md-tag">'+esc(t)+'</span>'; });
    h += '</div></div>';
  }
  // Socials in sidebar
  if (R.socials.length) {
    h += '<div class="md-block"><div class="md-block-title">社交链接</div>';
    h += '<div class="md-contact" style="font-size:11px">';
    R.socials.forEach(function(s){ if(s.url) h += esc(s.platform)+'<br>'; });
    h += '</div></div>';
  }
  h += '</div>';

  // Main content
  var p = 'rp-md';
  h += '<div class="'+p+'-main">';
  if (R.advantage) {
    h += '<div class="'+p+'-sec"><div class="'+p+'-sec-title"><span class="sec-decor">✦</span> 个人优势</div>';
    h += '<div class="'+p+'-item-desc">'+R.advantage.replace(/\n/g,'<br>')+'</div></div>';
  }
  h += secWorkExp(p, '工作经历', '◆', R.workExps);
  h += secWorkExp(p, '实习经历', '◇', R.internships);
  h += secProjects(p, '项目经历', '▲', R.projects);
  h += secEducation(p, '教育经历', '△', R.educations);
  h += secActivities(p, '社团经历', '○', R.activities);
  h += secSocials(p, '社交主页', '●', []);
  h += '</div>';

  document.getElementById('resume-preview').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════════
//  Template: Minimal 极简
// ═══════════════════════════════════════════════════════════════
function renderMinimal() {
  var i = R.info, e = R.expectation, p = 'rp-mn';
  var contactRight = [i.email, i.phone, i.wechat, i.hometown].filter(Boolean);
  var extraLine = [i.gender, i.birthday, i.political].filter(Boolean).join(' · ');

  h += '<div><div class="'+p+'-name">'+(i.name||'姓名')+'</div></div>';

  if (e.position) h += '<div class="'+p+'-job">'+esc(e.position)+(e.city?' / '+esc(e.city):'')+'</div>';
  contactRight.forEach(function(c){ h += '<div class="'+p+'-contact">'+esc(c)+'</div>'; });
  if (extraLine) h += '<div class="'+p+'-contact">'+esc(extraLine)+'</div>';
  h += '</div></div>';

  if (R.advantage) {
    h += '<div class="'+p+'-sec"><div class="'+p+'-sec-title">个人优势</div>';

  }
  h += secWorkExp(p, '工作经历', '', R.workExps);
  h += secWorkExp(p, '实习经历', '', R.internships);
  h += secProjects(p, '项目经历', '', R.projects);
  h += secEducation(p, '教育经历', '', R.educations);
  h += secActivities(p, '社团活动', '', R.activities);
  h += secTags(p, '技能证书 & 荣誉', '', R.certs, R.awards);

}

// ═══════════════════════════════════════════════════════════════
//  Template: Compact 紧凑
// ═══════════════════════════════════════════════════════════════
function renderCompact() {
  var i = R.info, e = R.expectation, p = 'rp-cp';
  var contactStr = [i.email, i.phone, i.wechat, i.hometown].filter(Boolean).join(' · ');
  var extraStr = [i.gender, i.birthday, i.political].filter(Boolean).join(' · ');
  var fullContact = [contactStr, extraStr].filter(Boolean).join(' · ');

  var h = '';
  h += '<div class="'+p+'-header">';
  h += '<span class="'+p+'-name">'+(i.name||'姓名')+'</span>';
  if (e.position) h += '<span class="'+p+'-job">'+esc(e.position)+'</span>';
  h += '<span class="'+p+'-contact">'+esc(fullContact)+'</span>';
  h += '</div>';

  // Two-column layout: section title on left, content on right
  var sections = [];
  if (R.advantage) sections.push({title:'个人优势', icon:'✨', html:'<div class="'+p+'-item-desc">'+R.advantage.replace(/\n/g,'<br>')+'</div>'});
  sections.push({title:'工作经历', icon:'💼', html:secCompactItems(p, R.workExps, function(w){
    var hh = '<div class="'+p+'-item-hd"><span class="'+p+'-item-title">'+esc(w.company)+'</span><span class="'+p+'-item-date">'+esc(w.startDate)+' — '+(esc(w.endDate)||'至今')+'</span></div>';
    hh += '<div class="'+p+'-item-sub">'+esc(w.position)+'</div>';
    if (w.description) hh += '<div class="'+p+'-item-desc">'+esc(w.description)+'</div>';
    if (w.achievements) hh += '<div class="'+p+'-item-desc">★ '+esc(w.achievements)+'</div>';
    return hh;
  })});
  sections.push({title:'教育经历', icon:'🎓', html:secCompactItems(p, R.educations, function(ed){
    return '<div class="'+p+'-item-hd"><span class="'+p+'-item-title">'+esc(ed.school)+'</span><span class="'+p+'-item-date">'+esc(ed.startDate)+' — '+esc(ed.endDate)+'</span></div><div class="'+p+'-item-sub">'+esc(ed.major)+(ed.degree?' · '+ed.degree:'')+'</div>';
  })});
  sections.push({title:'项目经历', icon:'🚀', html:secCompactItems(p, R.projects, function(pp){
    var hh = '<div class="'+p+'-item-hd"><span class="'+p+'-item-title">'+esc(pp.name)+'</span><span class="'+p+'-item-date">'+esc(pp.startDate)+' — '+esc(pp.endDate)+'</span></div>';
    if (pp.role) hh += '<div class="'+p+'-item-sub">'+esc(pp.role)+'</div>';
    if (pp.description) hh += '<div class="'+p+'-item-desc">'+esc(pp.description)+'</div>';
    if (pp.achievements) hh += '<div class="'+p+'-item-desc">★ '+esc(pp.achievements)+'</div>';
    return hh;
  })});

  var tags = [];
  R.certs.forEach(function(c){ if(c.name) tags.push(c.name); });
  R.awards.forEach(function(a){ if(a.name) tags.push(a.name); });
  if (tags.length) {
    var tagHtml = '<div class="'+p+'-tags">';
    tags.forEach(function(t){ tagHtml += '<span class="'+p+'-tag">'+esc(t)+'</span>'; });
    tagHtml += '</div>';
    sections.push({title:'技能证书', icon:'🏆', html:tagHtml});
  }

  sections.forEach(function(sec){
    if (!sec.html) return;
    h += '<div class="'+p+'-sec"><div class="'+p+'-sec-title"><span class="sec-decor">'+sec.icon+'</span> '+sec.title+'</div>';
    h += '<div class="'+p+'-sec-content">'+sec.html+'</div></div>';
  });
  document.getElementById('resume-preview').innerHTML = h;
}

function secCompactItems(p, arr, fn) {
  if (!arr.length) return '';
  var h = '';
  arr.forEach(function(item){
    h += '<div class="'+p+'-item">'+fn(item)+'</div>';
  });
  return h;
}

// ═══════════════════════════════════════════════════════════════
//  Preview dispatcher
// ═══════════════════════════════════════════════════════════════
function renderPreview() {
  switch(currentTemplate) {
    case 'modern': renderModern(); break;
    case 'minimal': renderMinimal(); break;
    case 'compact': renderCompact(); break;
    default: renderClassic();
  }
}

// ═══════════════════════════════════════════════════════════════
//  Template switching
// ═══════════════════════════════════════════════════════════════
function setTemplate(tpl) {
  currentTemplate = tpl;
  var paper = document.getElementById('resume-preview');
  paper.className = 'resume-paper tpl-'+tpl;
  document.querySelectorAll('.tpl-btn').forEach(function(btn){
    btn.classList.toggle('active', btn.dataset.tpl === tpl);
  });
  localStorage.setItem('auto_offer_template', tpl);
  renderPreview();
}

// ═══════════════════════════════════════════════════════════════
//  Persist
// ═══════════════════════════════════════════════════════════════
function saveLocal() { localStorage.setItem('auto_offer_resume', JSON.stringify(R)); toast('简历已保存到本地'); }
function loadLocal() {
  var raw = localStorage.getItem('auto_offer_resume');
  if (raw) {
    try {
      var saved = JSON.parse(raw);
      Object.keys(saved).forEach(function(k){ if (R.hasOwnProperty(k)) R[k] = saved[k]; });
      renderEditor(); renderPreview();
      toast('简历已加载');
    } catch(e) { toast('加载失败'); }
  } else { toast('没有保存的简历'); }
}
function printResume() { window.print(); }
function toast(msg) {
  var t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2000);
}

// ═══════════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════════
document.getElementById('tpl-group').addEventListener('click', function(e){
  var btn = e.target.closest('.tpl-btn');
  if (!btn) return;
  setTemplate(btn.dataset.tpl);
});

var savedTpl = localStorage.getItem('auto_offer_template');
if (savedTpl && ['classic','modern','minimal','compact'].indexOf(savedTpl) >= 0) {
  setTemplate(savedTpl);
}

var saved = localStorage.getItem('auto_offer_resume');
if (saved) {
  try {
    var parsed = JSON.parse(saved);
    Object.keys(parsed).forEach(function(k){ if (R.hasOwnProperty(k)) R[k] = parsed[k]; });
  } catch(e) {}
}

renderEditor();
renderPreview();
</script>
