<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>简历生成器 — Auto Offer</title>
<style>
:root {
  --bg:#141118; --surface:#1e1b24; --surface2:#25222d; --surface3:#2d2936;
  --border:#302c39; --text:#fff; --text2:#b0acb9; --text3:#787380;
  --lavender:#b8a9d4; --mint:#7ecba1; --cream:#f0d78c; --rose:#e8998d;
  --radius:18px; --radius-sm:12px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg); color:var(--text); line-height:1.5;
  -webkit-font-smoothing:antialiased; display:flex; height:100vh; overflow:hidden;
}

/* Sidebar */
.side { width:60px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; align-items:center; padding:16px 0; gap:4px; overflow-y:auto; }
.side-icon { width:38px; height:38px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:16px; cursor:pointer; transition:all .18s; color:var(--text3); flex-shrink:0; }
.side-icon:hover { color:var(--text2); background:var(--surface3); }
.side-icon.active { color:var(--lavender); background:rgba(184,169,212,.12); }
.side-divider { width:24px; height:1px; background:var(--border); margin:6px 0; }

/* Main layout */
.main { flex:1; display:flex; min-width:0; }
.editor { width:420px; flex-shrink:0; background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.preview { flex:1; display:flex; align-items:flex-start; justify-content:center; padding:28px; overflow-y:auto; background:var(--bg); }

/* Editor header */
.editor-hd { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.editor-hd h2 { font-size:16px; font-weight:600; }
.editor-actions { display:flex; gap:8px; }

/* Editor body */
.editor-body { flex:1; overflow-y:auto; padding:16px 20px; }
.section { display:none; }
.section.active { display:block; }

/* Form elements */
.field { margin-bottom:14px; }
.field label { display:block; font-size:12px; font-weight:500; color:var(--text3); margin-bottom:4px; text-transform:uppercase; letter-spacing:.3px; }
.field input, .field textarea, .field select {
  width:100%; padding:9px 14px; border-radius:var(--radius-sm); font-size:14px; font-family:inherit;
  background:var(--surface2); border:1px solid var(--border); color:var(--text);
  outline:none; transition:border-color .15s; resize:vertical;
}
.field input:focus, .field textarea:focus, .field select:focus { border-color:var(--lavender); }
.field textarea { min-height:80px; }
.field-row { display:flex; gap:10px; }
.field-row .field { flex:1; }

/* List items */
.list-item { background:var(--surface2); border-radius:var(--radius-sm); padding:14px; margin-bottom:10px; border:1px solid var(--border); position:relative; }
.list-item .remove-btn { position:absolute; top:8px; right:8px; width:24px; height:24px; border-radius:50%; background:var(--surface3); border:none; color:var(--text3); cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; }
.list-item .remove-btn:hover { background:var(--rose); color:#fff; }
.add-btn { width:100%; padding:10px; border-radius:var(--radius-sm); border:1px dashed var(--border); background:transparent; color:var(--text3); cursor:pointer; font-size:13px; font-family:inherit; transition:all .15s; }
.add-btn:hover { border-color:var(--lavender); color:var(--lavender); background:rgba(184,169,212,.06); }

/* Buttons */
.btn { padding:7px 18px; border-radius:980px; font-size:13px; font-weight:500; cursor:pointer; border:none; font-family:inherit; transition:all .15s; }
.btn-primary { background:var(--lavender); color:var(--bg); }
.btn-primary:hover { opacity:.85; }
.btn-ghost { background:var(--surface3); color:var(--text2); }
.btn-ghost:hover { background:var(--border); }
.btn-small { padding:4px 12px; font-size:12px; }

/* Resume preview (A4 style) */
.resume-paper { width:794px; min-height:1123px; background:#fff; color:#222; padding:56px 64px; font-size:14px; line-height:1.7; box-shadow:0 4px 40px rgba(0,0,0,.5); border-radius:2px; }
.resume-paper .rp-header { text-align:center; margin-bottom:28px; }
.resume-paper .rp-name { font-size:26px; font-weight:700; letter-spacing:1px; margin-bottom:6px; }
.resume-paper .rp-contact { font-size:13px; color:#555; display:flex; justify-content:center; gap:16px; flex-wrap:wrap; }
.resume-paper .rp-section { margin-bottom:22px; }
.resume-paper .rp-section-title { font-size:15px; font-weight:700; border-bottom:2px solid #333; padding-bottom:4px; margin-bottom:10px; letter-spacing:1px; }
.resume-paper .rp-item { margin-bottom:14px; }
.resume-paper .rp-item-hd { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
.resume-paper .rp-item-title { font-weight:600; font-size:15px; }
.resume-paper .rp-item-sub { color:#555; font-size:13px; }
.resume-paper .rp-item-date { color:#888; font-size:12px; white-space:nowrap; }
.resume-paper .rp-item-desc { color:#444; font-size:13px; }
.resume-paper .rp-tags { display:flex; flex-wrap:wrap; gap:6px; }
.resume-paper .rp-tag { padding:2px 10px; background:#f0f0f0; border-radius:4px; font-size:12px; color:#555; }
.resume-paper .rp-empty { color:#ccc; font-style:italic; }
.resume-paper .rp-avatar { width:80px; height:100px; background:#eee; border-radius:4px; float:right; margin-left:20px; display:flex; align-items:center; justify-content:center; font-size:11px; color:#aaa; }

/* Print */
@media print {
  body { background:#fff; }
  .side,.editor,.topbar { display:none !important; }
  .preview { padding:0; overflow:visible; }
  .resume-paper { box-shadow:none; width:100%; min-height:0; padding:40px 48px; border-radius:0; }
}

/* Toast */
.toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--surface2); color:var(--text); padding:10px 20px; border-radius:980px; font-size:13px; z-index:999; border:1px solid var(--border); box-shadow:0 4px 20px rgba(0,0,0,.4); animation:toastIn .3s ease; }
@keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }

@media (max-width:1200px) { .editor { width:360px; } .resume-paper { width:100%; } }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="side">
  <div class="side-icon active" data-section="0" title="个人信息">👤</div>
  <div class="side-icon" data-section="1" title="求职期望">🎯</div>
  <div class="side-icon" data-section="2" title="个人优势">✨</div>
  <div class="side-divider"></div>
  <div class="side-icon" data-section="3" title="工作经历">💼</div>
  <div class="side-icon" data-section="4" title="实习经历">📝</div>
  <div class="side-icon" data-section="5" title="教育经历">🎓</div>
  <div class="side-divider"></div>
  <div class="side-icon" data-section="6" title="项目经历">🚀</div>
  <div class="side-icon" data-section="7" title="社团经历">🤝</div>
  <div class="side-icon" data-section="8" title="资格证书">📜</div>
  <div class="side-icon" data-section="9" title="荣誉奖项">🏆</div>
  <div class="side-icon" data-section="10" title="社交主页">🔗</div>
</aside>

<div class="main">
<!-- Editor panel -->
<div class="editor">
  <div class="editor-hd">
    <h2 id="section-title">个人信息</h2>
    <div class="editor-actions">
      <button class="btn btn-ghost btn-small" onclick="saveLocal()">保存</button>
      <button class="btn btn-ghost btn-small" onclick="loadLocal()">加载</button>
      <button class="btn btn-primary btn-small" onclick="printResume()">打印PDF</button>
    </div>
  </div>
  <div class="editor-body" id="editor-body"></div>
</div>

<!-- Preview panel -->
<div class="preview">
  <div class="resume-paper" id="resume-preview"></div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  Data model
// ═══════════════════════════════════════════════════════════════
var R = {
  info: { name:'', birthday:'', gender:'', email:'', phone:'', wechat:'', hometown:'', political:'', workStart:'', avatar:'' },
  expectation: { position:'', city:'', salary:'' },
  advantage: '',
  workExps: [],
  internships: [],
  educations: [],
  projects: [],
  activities: [],
  certs: [],
  awards: [],
  socials: []
};

// ═══════════════════════════════════════════════════════════════
//  Section definitions
// ═══════════════════════════════════════════════════════════════
var sections = [
  { id:'info', title:'个人信息', icon:'👤' },
  { id:'expectation', title:'求职期望', icon:'🎯' },
  { id:'advantage', title:'个人优势', icon:'✨' },
  { id:'workExps', title:'工作经历', icon:'💼' },
  { id:'internships', title:'实习经历', icon:'📝' },
  { id:'educations', title:'教育经历', icon:'🎓' },
  { id:'projects', title:'项目经历', icon:'🚀' },
  { id:'activities', title:'社团经历', icon:'🤝' },
  { id:'certs', title:'资格证书', icon:'📜' },
  { id:'awards', title:'荣誉奖项', icon:'🏆' },
  { id:'socials', title:'社交主页', icon:'🔗' }
];

// ═══════════════════════════════════════════════════════════════
//  Form builders for each section
// ═══════════════════════════════════════════════════════════════
function formInfo() {
  var d = R.info;
  return fld('姓名')+inp('info.name',d.name,'请输入姓名')+
    frow(fld('生日')+inp('info.birthday',d.birthday,'date',1),fld('性别')+sel('info.gender',d.gender,['','男','女']))+
    frow(fld('邮箱')+inp('info.email',d.email,'email','请输入邮箱'),fld('电话')+inp('info.phone',d.phone,'tel','请输入电话'))+
    frow(fld('微信号')+inp('info.wechat',d.wechat,'','请输入微信号'),fld('籍贯')+inp('info.hometown',d.hometown,'','请输入籍贯'))+
    frow(fld('政治面貌')+sel('info.political',d.political,['','群众','共青团员','共产党员','民主党派','无党派人士']),fld('参加工作时间')+inp('info.workStart',d.workStart,'month'));
}

function formExpectation() {
  var d = R.expectation;
  return fld('期望职位')+inp('expectation.position',d.position,'','请输入职位关键词')+
    fld('期望城市')+inp('expectation.city',d.city,'','例如：杭州')+
    fld('薪资要求')+inp('expectation.salary',d.salary,'','例如：15k-25k 或 面议');
}

function formAdvantage() {
  return fld('个人优势 / 自我评价')+txt('advantage',R.advantage,'描述你的核心竞争力、专业特长...');
}

function formWorkExps() { return formList('workExps', R.workExps, workExpTemplate); }
function formInternships() { return formList('internships', R.internships, internshipTemplate); }
function formEducations() { return formList('educations', R.educations, educationTemplate); }
function formProjects() { return formList('projects', R.projects, projectTemplate); }
function formActivities() { return formList('activities', R.activities, activityTemplate); }
function formCerts() { return formList('certs', R.certs, certTemplate); }
function formAwards() { return formList('awards', R.awards, awardTemplate); }
function formSocials() { return formList('socials', R.socials, socialTemplate); }

var sectionForms = [formInfo, formExpectation, formAdvantage, formWorkExps, formInternships, formEducations, formProjects, formActivities, formCerts, formAwards, formSocials];

// ═══════════════════════════════════════════════════════════════
//  Item templates for list sections
// ═══════════════════════════════════════════════════════════════
function workExpTemplate(item, idx, prefix) {
  return frow(fld('公司名称')+inp(prefix+'.company',item.company||'','请输入公司名称'),fld('职位')+inp(prefix+'.position',item.position||'','请输入职位'))+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','month'))+
    fld('工作内容')+txt(prefix+'.description',item.description||'','描述主要工作职责和内容')+
    fld('工作成果')+txt(prefix+'.achievements',item.achievements||'','量化成果，如业绩提升、项目成果');
}
function internshipTemplate(item, idx, prefix) { return workExpTemplate(item, idx, prefix); }
function educationTemplate(item, idx, prefix) {
  return frow(fld('学校')+inp(prefix+'.school',item.school||'','请输入学校名称'),fld('专业')+inp(prefix+'.major',item.major||'','请输入专业'))+
    frow(fld('学历')+sel(prefix+'.degree',item.degree||'',['','大专','本科','硕士','博士','中专/中技','高中','初中及以下']),fld('')+'')+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','month'));
}
function projectTemplate(item, idx, prefix) {
  return frow(fld('项目名称')+inp(prefix+'.name',item.name||'','请输入项目名称'),fld('担任角色')+inp(prefix+'.role',item.role||'','请输入角色'))+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','month'))+
    fld('项目描述')+txt(prefix+'.description',item.description||'','描述项目背景、目标、技术栈')+
    fld('项目成果')+txt(prefix+'.achievements',item.achievements||'','个人贡献和量化成果');
}
function activityTemplate(item, idx, prefix) {
  return frow(fld('组织名称')+inp(prefix+'.orgName',item.orgName||'','请输入组织名称'),fld('担任角色')+inp(prefix+'.role',item.role||'','请输入角色'))+
    frow(fld('开始时间')+inp(prefix+'.startDate',item.startDate||'','month'),fld('结束时间')+inp(prefix+'.endDate',item.endDate||'','month'))+
    fld('经历描述')+txt(prefix+'.description',item.description||'','描述活动内容和收获');
}
function certTemplate(item, idx, prefix) {
  return frow(fld('证书名称')+inp(prefix+'.name',item.name||'','请输入证书名称'),fld('获得时间')+inp(prefix+'.date',item.date||'','month'));
}
function awardTemplate(item, idx, prefix) {
  return frow(fld('奖项名称')+inp(prefix+'.name',item.name||'','请输入奖项名称'),fld('获得时间')+inp(prefix+'.date',item.date||'','month'));
}
function socialTemplate(item, idx, prefix) {
  return frow(fld('平台')+inp(prefix+'.platform',item.platform||'','GitHub / 掘金 / 个人网站...'),fld('链接')+inp(prefix+'.url',item.url||'','https://'));
}

// ═══════════════════════════════════════════════════════════════
//  HTML helpers
// ═══════════════════════════════════════════════════════════════
function fld(l) { return '<div class="field"><label>'+l+'</label>'; }
function inp(path, val, type, placeholder) {
  var t = type||'text';
  return '<input type="'+t+'" value="'+esc(val)+'" placeholder="'+(placeholder||'')+'" onchange="setVal(\''+path+'\',this.value)" oninput="setVal(\''+path+'\',this.value)"></div>';
}
function txt(path, val, placeholder) {
  return '<textarea placeholder="'+(placeholder||'')+'" onchange="setVal(\''+path+'\',this.value)" oninput="setVal(\''+path+'\',this.value)">'+esc(val)+'</textarea></div>';
}
function sel(path, val, opts) {
  var h = '';
  opts.forEach(function(o){ h += '<option value="'+o+'"'+(o===val?' selected':'')+'>'+(o||'请选择')+'</option>'; });
  return '<select onchange="setVal(\''+path+'\',this.value)">'+h+'</select></div>';
}
function frow(l,r) { return '<div class="field-row">'+l+r+'</div>'; }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════════════════
//  List builder
// ═══════════════════════════════════════════════════════════════
function formList(key, arr, templateFn) {
  var h = '';
  arr.forEach(function(item, i){
    h += '<div class="list-item">';
    if (arr.length > 1) h += '<button class="remove-btn" onclick="removeItem(\''+key+'\','+i+')">×</button>';
    h += templateFn(item, i, key+'['+i+']');
    h += '</div>';
  });
  h += '<button class="add-btn" onclick="addItem(\''+key+'\')">+ 添加</button>';
  return h;
}

// ═══════════════════════════════════════════════════════════════
//  Data operations
// ═══════════════════════════════════════════════════════════════
function setVal(path, val) {
  var keys = path.replace(/\[(\d+)\]/g,'.$1').split('.');
  var obj = R;
  for (var i=0; i<keys.length-1; i++) obj = obj[keys[i]];
  obj[keys[keys.length-1]] = val;
  renderPreview();
}

function addItem(key) {
  var templates = {
    workExps: {company:'',position:'',startDate:'',endDate:'',description:'',achievements:''},
    internships: {company:'',position:'',startDate:'',endDate:'',description:'',achievements:''},
    educations: {school:'',major:'',degree:'',startDate:'',endDate:''},
    projects: {name:'',role:'',startDate:'',endDate:'',description:'',achievements:''},
    activities: {orgName:'',role:'',startDate:'',endDate:'',description:''},
    certs: {name:'',date:''},
    awards: {name:'',date:''},
    socials: {platform:'',url:''}
  };
  R[key].push(JSON.parse(JSON.stringify(templates[key])));
  renderEditor(currentSection);
  renderPreview();
}

function removeItem(key, idx) {
  R[key].splice(idx, 1);
  renderEditor(currentSection);
  renderPreview();
}

// ═══════════════════════════════════════════════════════════════
//  Editor rendering
// ═══════════════════════════════════════════════════════════════
var currentSection = 0;

function renderEditor(idx) {
  currentSection = idx;
  document.getElementById('section-title').textContent = sections[idx].title;
  document.getElementById('editor-body').innerHTML = sectionForms[idx]();
  document.querySelectorAll('.side-icon').forEach(function(el,i){ el.classList.toggle('active', i===idx); });
}

// ═══════════════════════════════════════════════════════════════
//  Resume preview
// ═══════════════════════════════════════════════════════════════
function renderPreview() {
  var i = R.info, e = R.expectation;
  var contact = [i.email, i.phone, i.wechat, i.hometown].filter(Boolean).join(' · ');

  var h = '<div class="rp-header">';
  h += '<div class="rp-name">'+ (i.name||'姓名') +'</div>';
  if (e.position) h += '<div style="font-size:15px;color:#555;margin-bottom:4px">求职意向：'+e.position+' | '+e.city+' | '+e.salary+'</div>';
  h += '<div class="rp-contact">'+contact+'</div>';
  if (i.birthday || i.gender || i.political) h += '<div class="rp-contact" style="margin-top:2px">'+[i.gender,i.birthday,i.political].filter(Boolean).join(' · ')+'</div>';
  h += '</div>';

  // Self-assessment
  if (R.advantage) {
    h += '<div class="rp-section"><div class="rp-section-title">个人优势</div>';
    h += '<div class="rp-item-desc">'+R.advantage.replace(/\n/g,'<br>')+'</div></div>';
  }

  // Work experience
  if (R.workExps.length > 0) {
    h += '<div class="rp-section"><div class="rp-section-title">工作经历</div>';
    R.workExps.forEach(function(w){
      h += '<div class="rp-item"><div class="rp-item-hd"><span class="rp-item-title">'+w.company+'</span><span class="rp-item-date">'+w.startDate+' — '+(w.endDate||'至今')+'</span></div>';
      h += '<div class="rp-item-sub">'+w.position+'</div>';
      if (w.description) h += '<div class="rp-item-desc">'+w.description+'</div>';
      if (w.achievements) h += '<div class="rp-item-desc" style="margin-top:4px">🏆 '+w.achievements+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Internships
  if (R.internships.length > 0) {
    h += '<div class="rp-section"><div class="rp-section-title">实习经历</div>';
    R.internships.forEach(function(w){
      h += '<div class="rp-item"><div class="rp-item-hd"><span class="rp-item-title">'+w.company+'</span><span class="rp-item-date">'+w.startDate+' — '+(w.endDate||'至今')+'</span></div>';
      h += '<div class="rp-item-sub">'+w.position+'</div>';
      if (w.description) h += '<div class="rp-item-desc">'+w.description+'</div>';
      if (w.achievements) h += '<div class="rp-item-desc" style="margin-top:4px">🏆 '+w.achievements+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Projects
  if (R.projects.length > 0) {
    h += '<div class="rp-section"><div class="rp-section-title">项目经历</div>';
    R.projects.forEach(function(p){
      h += '<div class="rp-item"><div class="rp-item-hd"><span class="rp-item-title">'+p.name+'</span><span class="rp-item-date">'+p.startDate+' — '+p.endDate+'</span></div>';
      if (p.role) h += '<div class="rp-item-sub">'+p.role+'</div>';
      if (p.description) h += '<div class="rp-item-desc">'+p.description+'</div>';
      if (p.achievements) h += '<div class="rp-item-desc" style="margin-top:4px">🏆 '+p.achievements+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Education
  if (R.educations.length > 0) {
    h += '<div class="rp-section"><div class="rp-section-title">教育经历</div>';
    R.educations.forEach(function(ed){
      h += '<div class="rp-item"><div class="rp-item-hd"><span class="rp-item-title">'+ed.school+'</span><span class="rp-item-date">'+ed.startDate+' — '+ed.endDate+'</span></div>';
      h += '<div class="rp-item-sub">'+ed.major + (ed.degree?' · '+ed.degree:'')+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Activities
  if (R.activities.length > 0) {
    h += '<div class="rp-section"><div class="rp-section-title">社团经历</div>';
    R.activities.forEach(function(a){
      h += '<div class="rp-item"><div class="rp-item-hd"><span class="rp-item-title">'+a.orgName+'</span><span class="rp-item-date">'+a.startDate+' — '+a.endDate+'</span></div>';
      if (a.role) h += '<div class="rp-item-sub">'+a.role+'</div>';
      if (a.description) h += '<div class="rp-item-desc">'+a.description+'</div>';
      h += '</div>';
    });
    h += '</div>';
  }

  // Skills: certs + awards
  var allTags = [];
  R.certs.forEach(function(c){ if(c.name) allTags.push(c.name); });
  R.awards.forEach(function(a){ if(a.name) allTags.push(a.name); });
  if (allTags.length > 0) {
    h += '<div class="rp-section"><div class="rp-section-title">技能证书 & 荣誉</div>';
    h += '<div class="rp-tags">';
    allTags.forEach(function(t){ h += '<span class="rp-tag">'+t+'</span>'; });
    h += '</div></div>';
  }

  // Social links
  if (R.socials.length > 0) {
    h += '<div class="rp-section"><div class="rp-section-title">社交主页</div>';
    R.socials.forEach(function(s){
      if (s.url) h += '<div class="rp-item-desc">🔗 '+s.platform+': '+s.url+'</div>';
    });
    h += '</div>';
  }

  document.getElementById('resume-preview').innerHTML = h;
}

// ═══════════════════════════════════════════════════════════════
//  Persist
// ═══════════════════════════════════════════════════════════════
function saveLocal() {
  localStorage.setItem('auto_offer_resume', JSON.stringify(R));
  toast('简历已保存到本地');
}
function loadLocal() {
  var raw = localStorage.getItem('auto_offer_resume');
  if (raw) {
    try {
      var saved = JSON.parse(raw);
      Object.keys(saved).forEach(function(k){ if (R.hasOwnProperty(k)) R[k] = saved[k]; });
      renderEditor(currentSection);
      renderPreview();
      toast('简历已加载');
    } catch(e) { toast('加载失败'); }
  } else { toast('没有保存的简历'); }
}
function printResume() { window.print(); }
function toast(msg) {
  var t = document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2000);
}

// ═══════════════════════════════════════════════════════════════
//  Init
// ═══════════════════════════════════════════════════════════════
document.querySelector('.side').addEventListener('click', function(e){
  var el = e.target.closest('.side-icon');
  if (!el) return;
  renderEditor(parseInt(el.dataset.section));
});

// Auto-load saved resume
var saved = localStorage.getItem('auto_offer_resume');
if (saved) {
  try {
    var parsed = JSON.parse(saved);
    Object.keys(parsed).forEach(function(k){ if (R.hasOwnProperty(k)) R[k] = parsed[k]; });
  } catch(e) {}
}

renderEditor(0);
renderPreview();
</script>
</body>
</html>
